<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bodies Barber — Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}"/>
</head>
<body class="auth-page">

  <div class="dither-bg"></div>

  <div class="auth-layout">
    <div class="auth-brand-side">
      <div class="brand">
        <h1 class="brand-title">Bodies</h1>
        <span class="brand-sub">Barber</span>
      </div>
    </div>

    <main class="auth-box">
      <h2 class="auth-title">LOGIN</h2>

      {% if erro %}
        <p class="auth-erro">{{ erro }}</p>
      {% endif %}

      <form method="POST" action="/login">
        <input
          class="auth-input"
          type="email"
          name="email"
          placeholder="NOME@GMAIL.COM"
          required
        />
        <input
          class="auth-input"
          type="password"
          name="senha"
          placeholder="SENHA"
          required
        />
        <button class="auth-btn" type="submit">PROSSEGUIR</button>
      </form>

      <a class="auth-link" href="/cadastro">CRIAR CONTA</a>
    </main>
  </div>

</body>
</html>
