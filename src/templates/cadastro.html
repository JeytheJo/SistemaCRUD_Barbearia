<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bodies Barber — Cadastro</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body class="auth-page">

  <div class="brand">
    <h1 class="brand-title">Bodies</h1>
    <span class="brand-sub">Barber</span>
  </div>

  <div class="dither-bg"></div>

  <main class="auth-box">
    <h2 class="auth-title">SEU PRIMEIRO CADASTRO</h2>

    {% if erro %}
      <p class="auth-erro">{{ erro }}</p>
    {% endif %}

    {% if sucesso %}
      <p class="auth-sucesso">{{ sucesso }}</p>
    {% endif %}

    <form method="POST" action="/cadastro">
      <input
        class="auth-input"
        type="text"
        name="nome"
        placeholder="NOME COMPLETO"
        required
      />
      <input
        class="auth-input"
        type="email"
        name="email"
        placeholder="NOME@GMAIL.COM"
        required
      />
      <input
        class="auth-input"
        type="text"
        name="telefone"
        placeholder="TELEFONE (OPCIONAL)"
      />
      <input
        class="auth-input"
        type="password"
        name="senha"
        placeholder="SENHA"
        required
      />
      <button class="auth-btn" type="submit">PROSSEGUIR</button>
    </form>

    <a class="auth-link" href="/login">JÁ TENHO CONTA</a>
  </main>

</body>
</html>
